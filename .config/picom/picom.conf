# picom configuration

# Opacity

active-opacity = 1.0;
inactive-opacity = 1.0;

# Blur

blur-method = "dual_kawase";
blur-strength = 4;
blur-kern = "3x3box";

# This is needed when using the ibhagwan/picom fork.
blur-background-exclude = [
	"window_type = 'utility'",
	"class_g = 'Rofi'"
];

# Rounded corners

# This uses the ibhagwan/picom fork at <https://github.com/ibhagwan/picom>.
#
# This section is currently disabled because of an issue with the window shadows
# not rounded properly.

# corner-radius = 4;
# round-borders = 1;

# rounded-corners-exclude = [
# 	"window_type = 'dock'",
# 	"window_type = 'utility'",
# 	"window_type = 'dropdown_menu'",
# 	"window_type = 'popup_menu'"
# ];

# Shadow

shadow = true;
shadow-radius = 20;
shadow-offset-x = -20;
shadow-offset-y = -20;
shadow-opacity = 0.9;

shadow-exclude = [
	"class_g = 'slop'",
	"class_g = 'Rofi'"
];

# Crop shadow of a window fully on a particular Xinerama screen to the screen.
xinerama-shadow-crop = true;

# General

backend = "glx";

wintypes: {
	dock = {
		full-shadow = true;
		blur-background = false;
	};
	utility = {
		shadow = false;
		blur-background = false;
	};
	popup_menu = {
		shadow = false;
	};
	tooltip = {
		shadow = false;
		opacity = 1.0;
		blur-background = false;
	};
	dnd = {
		shadow = false;
		blur-background = false;
	};
};
