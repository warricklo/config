# Opacity

active-opacity = 1.0;
inactive-opacity = 1.0;

# Blur

blur-method = "dual_kawase";
blur-strength = 4;
blur-kern = "3x3box";

# Shadow

shadow = true;
shadow-radius = 20;
shadow-offset-x = -20;
shadow-offset-y = -20;
shadow-opacity = 0.9;

shadow-exclude = [
	"class_g = 'slop'",
	"class_g = 'Rofi'"
];

# Crop shadow of a window fully on a particular Xinerama screen to the screen.
xinerama-shadow-crop = true;

# General

backend = "glx";

wintypes: {
	dock = {
		full-shadow = true;
		blur-background = false;
	};
	utility = {
		shadow = false;
		blur-background = false;
	};
	popup_menu = {
		shadow = false;
	};
	tooltip = {
		shadow = false;
		opacity = 1.0;
		blur-background = false;
	};
	dnd = {
		shadow = false;
		blur-background = false;
	};
};
